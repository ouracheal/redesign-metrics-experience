<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metrics Explorer – Query</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f8; color: #1a1a2e; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .btn-sm { display: flex; align-items: center; gap: 6px; padding: 5px 13px; border: 1px solid #d1d5db; border-radius: 7px; background: #fff; font-size: 12.5px; color: #374151; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
    .btn-sm:hover { background: #f9fafb; }

    /* Subbar */
    .subbar { display: flex; align-items: center; background: #fff; border-bottom: 1px solid #e5e5ed; padding: 0 24px; height: 48px; gap: 12px; flex-shrink: 0; }
    .back-btn { display: flex; align-items: center; gap: 6px; font-size: 13.5px; color: #374151; cursor: pointer; text-decoration: none; margin-right: auto; transition: color 0.15s; }
    .back-btn:hover { color: #7c3aed; }
    .btn-primary { padding: 7px 18px; border: none; border-radius: 6px; background: #7c3aed; font-size: 13px; font-weight: 600; color: #fff; cursor: pointer; transition: background 0.15s; }
    .btn-primary:hover { background: #6d28d9; }
    .legacy-link { font-size: 13px; color: #9ca3af; cursor: pointer; }

    /* Search Bar */
    .search-bar-wrap { background: #fff; border-bottom: 1px solid #e5e5ed; padding: 10px 24px; flex-shrink: 0; }
    .search-bar { display: flex; align-items: center; border: 2px solid #7c3aed; border-radius: 10px; padding: 8px 14px; gap: 10px; background: #fff; transition: border-color 0.2s, box-shadow 0.2s; }
    .search-bar:focus-within { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.12); }
    .search-bar input { flex: 1; border: none; outline: none; font-size: 14px; color: #1a1a2e; background: transparent; }
    .search-bar input::placeholder { color: #9ca3af; }
    .btn-ai { display: flex; align-items: center; gap: 5px; background: #7c3aed; color: #fff; border: none; border-radius: 7px; padding: 6px 13px; font-size: 13px; font-weight: 600; cursor: pointer; flex-shrink: 0; box-shadow: 0 2px 8px rgba(124,58,237,0.3); }

    /* Main */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* Bits Sidebar */
    .sidebar {
      width: 340px; flex-shrink: 0;
      background: #0f1117;
      display: flex; flex-direction: column; overflow: hidden;
      border-left: 1px solid #e5e5ed;
    }
    .sidebar-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 18px;
      background: linear-gradient(135deg, #1a1040 0%, #0f1117 100%);
      border-bottom: 1px solid rgba(124,58,237,0.2);
    }
    .bits-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 14px rgba(124,58,237,0.5);
    }
    .bits-title { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.01em; }
    .sidebar-tagline { font-size: 11.5px; color: rgba(255,255,255,0.4); padding: 9px 18px 10px; line-height: 1.5; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .sidebar-items { flex: 1; padding: 0 12px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
    .sidebar-item { display: flex; align-items: flex-start; justify-content: space-between; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 11px 13px; cursor: pointer; transition: all 0.15s; }
    .sidebar-item:hover { background: rgba(124,58,237,0.12); border-color: rgba(124,58,237,0.3); }
    .sidebar-item-text { font-size: 12.5px; font-weight: 500; color: #d1d5db; line-height: 1.4; padding-right: 8px; }
    .sidebar-item-arrow { color: #4b5563; font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .sidebar-section-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.1em; padding: 14px 12px 4px; }
    .sidebar-footer {
      padding: 12px 14px 14px;
      background: rgba(0,0,0,0.25);
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-input-wrap {
      display: flex; align-items: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 9px 9px 9px 14px;
      gap: 8px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .sidebar-input-wrap:focus-within {
      border-color: rgba(124,58,237,0.55);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
    }
    .sidebar-input-wrap input { flex: 1; border: none; outline: none; background: transparent; font-size: 13px; color: #e5e7eb; }
    .sidebar-input-wrap input::placeholder { color: rgba(255,255,255,0.25); }
    .send-btn {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(124,58,237,0.4);
    }
    .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 14px rgba(124,58,237,0.55); }
    .send-btn svg { color: #fff; }
    .sidebar-hint { text-align: center; font-size: 10.5px; color: rgba(255,255,255,0.2); margin-top: 8px; }

    /* Chat UI */
    .chat-history { flex: 1; padding: 14px 12px 6px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; scroll-behavior: smooth; }
    .chat-history::-webkit-scrollbar { width: 3px; }
    .chat-history::-webkit-scrollbar-track { background: transparent; }
    .chat-history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 3px; }
    .chat-msg { display: flex; flex-direction: column; gap: 4px; }
    .chat-msg.user { align-items: flex-end; }
    .chat-msg.bot { align-items: flex-start; }
    .chat-msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .chat-msg.user .chat-msg-row { flex-direction: row-reverse; }
    .bot-avatar {
      width: 24px; height: 24px; flex-shrink: 0;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      box-shadow: 0 0 8px rgba(124,58,237,0.3);
    }
    .chat-bubble { padding: 10px 13px; border-radius: 16px; font-size: 13px; line-height: 1.55; max-width: 85%; word-break: break-word; }
    .chat-msg.user .chat-bubble {
      background: linear-gradient(135deg, #7c3aed, #9333ea);
      color: #fff;
      border-bottom-right-radius: 5px;
      box-shadow: 0 2px 12px rgba(124,58,237,0.3);
    }
    .chat-msg.bot .chat-bubble {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #e5e7eb;
      border-bottom-left-radius: 5px;
      white-space: pre-line;
    }
    .chat-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 12px 12px; }
    .chip {
      padding: 5px 12px;
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.25);
      border-radius: 20px; font-size: 11.5px; color: #c4b5fd;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .chip:hover { background: rgba(124,58,237,0.22); border-color: rgba(124,58,237,0.5); color: #e9d5ff; transform: translateY(-1px); }
    .typing-indicator {
      display: flex; gap: 5px; padding: 12px 15px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; border-bottom-left-radius: 5px;
      align-self: flex-start;
    }
    .typing-indicator span { width: 6px; height: 6px; border-radius: 50%; background: #6b7280; animation: tdot 1.2s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-5px);opacity:1} }
    @keyframes msgIn { from { opacity:0; transform:translateY(8px) scale(0.98); } to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes chipIn { from { opacity:0; transform:scale(0.88); } to { opacity:1; transform:scale(1); } }
    @keyframes queryFlash { 0%{background:rgba(124,58,237,0.12);} 100%{background:transparent;} }
    .chat-bubble { animation: msgIn 0.25s cubic-bezier(0.34,1.3,0.64,1) both; }
    .chip { animation: chipIn 0.18s ease both; }
    .chat-action-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px;
      background: rgba(124,58,237,0.12);
      border: 1px solid rgba(167,139,250,0.25);
      border-radius: 6px; font-size: 10.5px; color: #a78bfa; margin-top: 5px;
    }

    /* Content Panel */
    .content-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 20px 24px 0; gap: 0; }
    .charts-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; padding: 14px 0 20px; }

    /* Query Builder */
    @keyframes panelPulse { 0%{box-shadow:0 0 0 0 rgba(124,58,237,0);border-color:#e5e7eb;} 28%{box-shadow:0 0 0 5px rgba(124,58,237,0.2);border-color:#a78bfa;} 100%{box-shadow:0 0 0 0 rgba(124,58,237,0);border-color:#e5e7eb;} }
    @keyframes fieldPop { 0%{box-shadow:0 0 0 0 rgba(124,58,237,0.55);} 55%{box-shadow:0 0 0 5px rgba(124,58,237,0);} 100%{box-shadow:0 0 0 0 rgba(124,58,237,0);} }
    @keyframes compRowIn { from{opacity:0;max-height:0;padding-top:0;padding-bottom:0;} to{opacity:1;max-height:60px;padding-top:0;padding-bottom:0;} }
    .qb-panel { background:#fff; border:1px solid #e5e7eb; border-radius:12px; overflow:hidden; transition:border-color 0.3s, box-shadow 0.3s; flex-shrink:0; margin-bottom:14px; }
    .qb-panel.panel-updating { animation: panelPulse 0.75s ease forwards; }
    .qb-row { display:flex; align-items:center; padding:8px 14px; gap:0; min-height:50px; }
    .qb-divider { height:1px; background:#e5e7eb; }
    .qb-add-row { display:flex; align-items:center; gap:8px; padding:8px 14px; border-top:1px solid #e5e7eb; }
    .qb-add-btn { display:flex; align-items:center; gap:4px; padding:5px 12px; border:1px solid #e5e7eb; border-radius:5px; background:#f9fafb; font-size:12.5px; color:#374151; cursor:pointer; transition:background 0.15s, border-color 0.15s; }
    .qb-add-btn:hover { background:rgba(124,58,237,0.06); border-color:rgba(124,58,237,0.3); color:#7c3aed; }
    /* Series badge */
    .qb-badge { width:24px; height:24px; border-radius:4px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:700; flex-shrink:0; margin-right:10px; }
    .qb-badge-a { background:#1b6fd8; }
    .qb-badge-b { background:#0f7b6c; }
    .qb-badge-vs { background:rgba(0,0,0,0.12); font-size:9px; letter-spacing:-0.5px; }
    /* Type dropdown */
    .qb-type { display:flex; align-items:center; gap:4px; padding:5px 10px; border:1px solid #e5e7eb; border-radius:5px; font-size:13px; color:#374151; cursor:pointer; margin-right:8px; white-space:nowrap; background:#f9fafb; flex-shrink:0; transition:background 0.15s; }
    .qb-type:hover { background:#f3f4f6; }
    /* Metric field — purple tinted */
    .qb-metric { flex:0 0 auto; min-width:140px; max-width:300px; background:rgba(124,58,237,0.08); border:1px solid rgba(124,58,237,0.25); border-radius:5px; padding:5px 10px; font-family:"SF Mono","Fira Code",monospace; font-size:12.5px; color:#5b21b6; cursor:pointer; margin-right:6px; transition:border-color 0.15s, box-shadow 0.2s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .qb-metric:hover { border-color:#7c3aed; }
    .qb-metric.field-pop { animation: fieldPop 0.65s ease; }
    /* Labels */
    .qb-lbl { font-size:13px; color:#6b7280; padding:0 6px; white-space:nowrap; flex-shrink:0; }
    /* Filter field */
    .qb-filter { min-width:110px; background:#f9fafb; border:1px solid #e5e7eb; border-radius:5px; padding:5px 10px; font-size:13px; color:#9ca3af; cursor:pointer; margin-right:6px; transition:border-color 0.15s, box-shadow 0.2s; white-space:nowrap; }
    .qb-filter:hover { border-color:rgba(124,58,237,0.4); }
    .qb-filter.has-val { color:#374151; }
    .qb-filter.field-pop { animation: fieldPop 0.65s ease; }
    /* Agg selector */
    .qb-agg-wrap { position:relative; display:flex; align-items:center; margin-right:6px; }
    .qb-agg-val { font-size:13px; font-weight:600; color:#374151; cursor:pointer; padding:5px 8px; border-radius:5px; border:1px solid transparent; transition:all 0.15s; white-space:nowrap; }
    .qb-agg-val:hover { border-color:rgba(124,58,237,0.3); background:rgba(124,58,237,0.06); color:#7c3aed; }
    .qb-agg-val.field-pop { animation: fieldPop 0.65s ease; border-color:#7c3aed; }
    /* Group-by field — purple accent */
    .qb-groupby-wrap { position:relative; }
    .qb-groupby { min-width:100px; background:rgba(124,58,237,0.06); border:1px solid rgba(124,58,237,0.2); border-radius:5px; padding:5px 10px; font-size:13px; color:#7c3aed; cursor:pointer; transition:border-color 0.15s, box-shadow 0.2s; white-space:nowrap; }
    .qb-groupby:hover { border-color:rgba(124,58,237,0.4); background:rgba(124,58,237,0.1); }
    .qb-groupby.has-val { color:#6d28d9; font-weight:500; }
    .qb-groupby.field-pop { animation: fieldPop 0.65s ease; border-color:#7c3aed; }
    /* Modify btn */
    .qb-modify { display:flex; align-items:center; gap:5px; padding:5px 12px; border:1px solid #e5e7eb; border-radius:5px; background:#fff; font-size:13px; color:#374151; cursor:pointer; margin-left:8px; white-space:nowrap; transition:background 0.15s; }
    .qb-modify:hover { background:#f9fafb; }
    /* AI btn */
    .qb-ai-btn { width:30px; height:30px; background:linear-gradient(135deg, #7c3aed, #6d28d9); border:none; border-radius:6px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; cursor:pointer; margin-left:6px; flex-shrink:0; transition:opacity 0.15s; box-shadow:0 2px 8px rgba(124,58,237,0.3); }
    .qb-ai-btn:hover { opacity:0.85; }
    /* Right icons */
    .qb-right { display:flex; align-items:center; gap:14px; margin-left:auto; padding-left:16px; color:#9ca3af; font-size:13px; flex-shrink:0; }
    .qb-right span { cursor:pointer; transition:color 0.15s; }
    .qb-right span:hover { color:#374151; }
    /* Comparison row */
    .qb-comp-row { display:flex; align-items:center; gap:8px; padding:7px 14px; border-top:1px dashed #e5e7eb; background:#f9fafb; animation:compRowIn 0.25s ease; overflow:hidden; }
    .qb-comp-lbl { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; background:rgba(124,58,237,0.08); border:1px solid rgba(124,58,237,0.25); border-radius:20px; font-size:10.5px; font-weight:700; color:#7c3aed; white-space:nowrap; flex-shrink:0; }
    .qb-comp-dash { display:inline-block; width:12px; height:0; border-top:2px dashed #7c3aed; vertical-align:middle; }
    .qb-comp-query { font-family:"SF Mono","Fira Code",monospace; font-size:12px; color:#9ca3af; flex:1; font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .qb-comp-remove { cursor:pointer; color:#9ca3af; padding:2px 6px; border-radius:4px; transition:color 0.15s, background 0.15s; font-size:13px; flex-shrink:0; }
    .qb-comp-remove:hover { color:#ef4444; background:rgba(239,68,68,0.08); }
    /* Dropdown */
    .qb-dropdown { position:absolute; top:calc(100% + 4px); left:0; background:#fff; border:1px solid #e5e7eb; border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,0.1); z-index:200; min-width:110px; padding:4px; }
    .qb-dropdown-opt { padding:7px 12px; font-family:"SF Mono","Fira Code",monospace; font-size:12.5px; color:#374151; cursor:pointer; border-radius:5px; white-space:nowrap; }
    .qb-dropdown-opt:hover { background:rgba(124,58,237,0.08); color:#7c3aed; }
    .qb-dropdown-opt.sel { background:rgba(124,58,237,0.1); color:#7c3aed; font-weight:600; }

    /* Comparison Chart */
    .comp-chart-panel { background:#fff; border:1px solid #e5e7eb; border-radius:10px; padding:20px 24px 16px; display:none; }
    .comp-chart-panel.visible { display:block; animation: msgIn 0.3s ease; }
    .comp-chart-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .comp-chart-title { font-size:13px; font-weight:600; color:#374151; }
    .comp-chart-meta { font-size:12px; color:#9ca3af; }
    .comp-period-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; background:rgba(124,58,237,0.08); border:1px solid rgba(124,58,237,0.2); border-radius:20px; font-size:11px; font-weight:600; color:#7c3aed; }
    /* Chart */
    .chart-panel { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:20px 24px 16px; transition:border-color 0.3s, box-shadow 0.3s; }
    @keyframes chartPulse { 0%{box-shadow:0 0 0 0 rgba(124,58,237,0);border-color:#e5e7eb;} 30%{box-shadow:0 0 0 5px rgba(124,58,237,0.2);border-color:#a78bfa;} 100%{box-shadow:0 0 0 0 rgba(124,58,237,0);border-color:#e5e7eb;} }
    .chart-panel.chart-updating { animation: chartPulse 0.75s ease forwards; }
    @keyframes toastIn { 0%{opacity:0;transform:translateX(-50%) translateY(-8px) scale(0.92);} 14%{opacity:1;transform:translateX(-50%) translateY(0) scale(1);} 72%{opacity:1;transform:translateX(-50%) translateY(0) scale(1);} 100%{opacity:0;transform:translateX(-50%) translateY(-5px) scale(0.95);} }
    .chart-toast { position:absolute; top:10px; left:50%; transform:translateX(-50%); background:rgba(109,40,217,0.93); color:#fff; font-size:12px; font-weight:500; padding:5px 16px; border-radius:20px; white-space:nowrap; pointer-events:none; z-index:10; animation:toastIn 2.5s ease forwards; letter-spacing:0.01em; }
    @keyframes pillPulse { 0%{box-shadow:0 0 0 0 rgba(124,58,237,0.6);} 60%{box-shadow:0 0 0 7px rgba(124,58,237,0);} 100%{box-shadow:0 0 0 0 rgba(124,58,237,0);} }
    .pill-activated { animation: pillPulse 0.55s ease; }
    .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .chart-title { font-size: 13px; font-weight: 600; color: #111827; }
    .chart-meta { font-size: 12px; color: #6b7280; }
    .chart-container { position: relative; width: 100%; height: 260px; }
    canvas { width: 100%; height: 100%; }

    /* Legend */
    .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #6b7280; }
    .legend-dot { width: 10px; height: 3px; border-radius: 2px; }

    .help-btn { position: fixed; bottom: 24px; right: 24px; width: 36px; height: 36px; border-radius: 50%; background: #fff; border: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #6b7280; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }
  </style>
</head>
<body>

  <!-- Subbar -->
  <div class="subbar">
    <a class="back-btn" href="metrics-explorer.html">← Back to search</a>
    <button class="btn-sm">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Last 24h ▾
    </button>
    <button class="btn-sm">Save</button>
    <span class="legacy-link">Show legacy experience</span>
  </div>

  <!-- Search Bar -->
  <div class="search-bar-wrap">
    <div class="search-bar">
      <span style="color:#9ca3af;flex-shrink:0;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input id="searchInput" type="text" placeholder="Ask a question about your metrics..." />
      <button class="btn-ai" onclick="runSearch()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
        AI
      </button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">

  <script>
  // ── NLU: metric catalog with chart shapes ──────────────────────────────
  const METRIC_CATALOG = [
    {

    {

      aggs: ['sum','avg','max'], defaultAgg: 'sum',
      allTags: ['region'],

      defaultFilter: 'region:eastus',

      series: ['eastus','westus'],
      colors: ['#0078d4','#7c3aed'],

    },
    {
      match: ['dead letter','dlq','sqs queue','message queue','kafka'],
      metric: 'data_streams.sqs.dead_letter_queue.messages',
      type: 'gauge', description: 'Dead letter queue message count',
      aggs: ['max','sum','avg'], defaultAgg: 'max',
      allTags: ['queue_name','env','region'],
      defaultGroupBy: 'queue_name',
      defaultFilter: 'env:prod',
      shape: 'random_spikes',
      series: ['orders-dlq','payments-dlq'],
      colors: ['#ef4444','#f97316'],
      yLabel: 'messages',
    },
    {
      match: ['load','traffic','requests per second','rps','request volume'],
      metric: 'load_generator.common.request.attempt',
      type: 'count', description: 'Incoming request rate',
      aggs: ['sum','avg','max'], defaultAgg: 'sum',
      allTags: ['env','service','endpoint'],
      defaultGroupBy: 'service',
      defaultFilter: 'env:prod',
      shape: 'business_hours',
      series: ['web-store','api','checkout'],
      colors: ['#7c3aed','#06b6d4','#10b981'],

    {
      match: ['appsec','security','signal','attack','threat'],

      aggs: ['sum','avg','max','p95'], defaultAgg: 'sum',

      shape: 'random_spikes',
      series: ['shopist'],

    },
    {
      match: ['sales','revenue','conversion','purchase','sold'],
      metric: 'synth.funnel.sales_completed',

      defaultGroupBy: 'region',
      defaultFilter: 'env:prod',

    },
    {
      match: ['io','iowait','io wait','disk io'],
      metric: 'system.io.await',
      type: 'gauge', description: 'I/O await time',
      aggs: ['avg','max','p95'], defaultAgg: 'avg',
      allTags: ['host','availability-zone','type'],
      defaultGroupBy: 'availability-zone',
      defaultFilter: 'type:iot',
      shape: 'variable',

    // fallback
    {
      match: ['__default__'],
      metric: 'shopist.scenarios.checkout.failures',
      type: 'rate', description: 'Checkout failures across Shopist',
      aggs: ['max','avg','sum','min'], defaultAgg: 'max',
      allTags: ['env','availability-zone','region','service'],

      shape: 'spike',

      yLabel: 'failures/min',

  // ── NLU helpers ──────────────────────────────────────────────────────────
  const AGG_WORDS = {
    'max':['max','maximum','highest','peak','worst'],
    'min':['min','minimum','lowest','best'],
    'avg':['avg','average','mean'],
    'sum':['sum','total','count','how many'],
    'p95':['p95','95th','95 percentile'],
    'p99':['p99','99th','99 percentile'],
  };

  const GROUPBY_WORDS = {
    'availability-zone':['availability zone','availability-zone','zone','az'],
    'host':['host','hostname','server','machine','node'],
    'service':['service'],
    'region':['region'],
    'cluster-name':['cluster'],
    'env':['environment','env'],
    'user_id':['user','user id'],
    'user_ip_address':['ip','ip address','user ip'],
    'queue_name':['queue'],
    'device':['device'],
  };

  function parseQuery(q) {
    const ql = q.toLowerCase();

    // Find matching metric
    let found = null;
    for (const entry of METRIC_CATALOG) {
      if (entry.match[0] === '__default__') continue;
      if (entry.match.some(m => ql.includes(m))) { found = entry; break; }
    }
    if (!found) found = METRIC_CATALOG[METRIC_CATALOG.length - 1]; // fallback

    // Extract aggregation override
    let agg = found.defaultAgg;
    for (const [key, words] of Object.entries(AGG_WORDS)) {
      if (words.some(w => ql.includes(w)) && found.aggs.includes(key)) { agg = key; break; }
    }

    // Extract groupBy override
    let groupBy = found.defaultGroupBy;
    for (const [key, words] of Object.entries(GROUPBY_WORDS)) {
      if (words.some(w => ql.includes(w)) && found.allTags.includes(key)) { groupBy = key; break; }
    }

    const ranges = METRIC_RANGES[found.metric] || { yMin: 0, yMax: 100 };
    return { ...found, selectedAgg: agg, selectedGroupBy: groupBy, ...ranges };
  }

  function buildDDQuery(cfg) {
    const gb = cfg.selectedGroupBy ? ` by {${cfg.selectedGroupBy}}` : '';
    return `${cfg.selectedAgg}:${cfg.metric}{${cfg.defaultFilter}}${gb}`;
  }

  // ── Chart data generators ────────────────────────────────────────────────
  function rnd(min, max) { return min + Math.random() * (max - min); }

  // Accurate value ranges sourced directly from shopist synthesizer/main.py
  // and scenarios/application.py submitted values.
  const METRIC_RANGES = {
    // scenarios/application.py: random.uniform(1,2) baseline, spike random.uniform(i*4, i*4.5) i=0..25

    // synthesizer suite: BusinessHours instrument, e-commerce cart abandonment
    'shopist.funnel.pct_carts_abandoned':              { yMin: 0,      yMax: 100   },
    // synthesizer suite: avg time in seconds
    'shopist.funnel.avg_time_to_checkout':             { yMin: 60,     yMax: 320   },
    // synthesizer/main.py: increment by 1 every 10s, as sum/min = ~0-20 failures/interval
    'shopist.user.login_attempt.failure_count':        { yMin: 0,      yMax: 20    },
    'shopist.user.login_attempt.success_count':        { yMin: 0,      yMax: 100   },
    // synthesizer/main.py: gauge 1 (up) or 0 (down) — drops ~5x/day for 1 min
    'shopist.web.up':                                  { yMin: 0,      yMax: 1     },
    // synthesizer/main.py: SawTooth anomaly+trend+shift instrument
    'shopist.synthesizer.errors':                      { yMin: 0,      yMax: 200   },
    // synthesizer/main.py: user = max(randint(0,100-wait),1) → 1-99; high_CPU: randint(min_now+30,99)
    'system.cpu.user':                                 { yMin: 0,      yMax: 100   },
    'system.cpu.system':                               { yMin: 0,      yMax: 60    },
    'system.cpu.idle':                                 { yMin: 0,      yMax: 79    },
    // synthesizer/main.py: randint(0,5)
    'system.cpu.iowait':                               { yMin: 0,      yMax: 5     },
    // synthesizer/main.py: user/2
    'system.load.1':                                   { yMin: 0,      yMax: 50    },
    // synthesizer/main.py: mem_one_gb=1024 MB; usable = 1024-(200+(min_now+1)*10+randint(0,201))
    'system.mem.usable':                               { yMin: 24,     yMax: 814   },
    'system.mem.total':                                { yMin: 1024,   yMax: 1024  },
    // synthesizer/main.py: swap = randint(64, 512)
    'system.swap.used':                                { yMin: 64,     yMax: 512   },
    'system.swap.free':                                { yMin: 512,    yMax: 960   },
    // synthesizer/main.py: disk_one_gb=1024*1024; total=40-400 × disk_one_gb bytes; in_use = fraction+0.01
    'system.disk.in_use':                              { yMin: 0.01,   yMax: 0.95  },
    'system.disk.total':                               { yMin: 41943040, yMax: 419430400 },
    'system.disk.free':                                { yMin: 6221520,  yMax: 314572800 },
    // synthesizer/main.py: random.randint(4, 32) ms
    'system.io.await':                                 { yMin: 4,      yMax: 32    },
    // synthesizer/main.py: randint(100000, 200000) bytes
    'system.net.bytes_rcvd':                           { yMin: 100000, yMax: 200000 },
    'system.net.bytes_sent':                           { yMin: 100000, yMax: 200000 },
    // scenarios/application.py: submit_metric_duration, val=0..25 → p95 ~ 0..62 units
    'trace.rack.request.duration':                     { yMin: 0,      yMax: 65    },
    'shopist.trace.rack.request.errors':               { yMin: 0,      yMax: 50    },
    'shopist.trace.rack.request.latency.50p':          { yMin: 0,      yMax: 40    },
    // scenarios/application.py: random.uniform(3500, 3500+100*25) → 3500-6000 qps
    'mongodb.opcounters.queryps':                      { yMin: 3500,   yMax: 6000  },
    // scenarios/application.py: random.uniform(70, 70+2*25) → 70-120
    'mongodb.globallock.activeclients.readers':        { yMin: 70,     yMax: 120   },
    // scenarios/application.py: random.uniform(35, 35+2*25) → 35-85
    'mongodb.metrics.cursor.open.total':               { yMin: 35,     yMax: 85    },
    // scenarios/application.py: random.uniform(1, ~13)
    'mongodb.globallock.currentqueue.readers':         { yMin: 0,      yMax: 13    },
    // scenarios/application.py: random.uniform(3584, 3584+100*25) → 3584-6084 MiB
    'mongodb.mem.virtual':                             { yMin: 3584,   yMax: 6084  },
    // scenarios/application.py: random.uniform(275, 275+5*25) → 275-400
    'mongodb.connections.current':                     { yMin: 275,    yMax: 400   },
    // synthesizer/main.py: constant 22°C; actual_temperature from suite ≈ 22 ± 4°C

    'device.target_temperature':                       { yMin: 22,     yMax: 22    },

    'device.wlan_signal_dbm':                          { yMin: -90,    yMax: -30   },
    // synthesizer/main.py: api.Metric.send — eastus=23, westus=17 (near-constant)
    'azure.devices_iothubs.devices.connected_devices.all_protocol': { yMin: 14, yMax: 27 },
    'azure.devices_iothubs.devices.total_devices':     { yMin: 22,     yMax: 42    },
    // synthesizer/main.py: 0 most of the time, randint(4,8) 2% of the time
    'cloudfoundry.nozzle.cc.job_queue_length.total':   { yMin: 0,      yMax: 8     },
    // synthesizer/main.py: randint(2,9)*1024 → 2048-9216 MB remaining
    'cloudfoundry.nozzle.rep.CapacityRemainingMemory': { yMin: 2048,   yMax: 9216  },
    'cloudfoundry.nozzle.AuctioneerLRPAuctionsStarted':{ yMin: 95,     yMax: 102   },
    // load generator: high-frequency increments
    'load_generator.common.request.attempt':           { yMin: 0,      yMax: 1000  },
    'load_generator.common.request.failed.connect':    { yMin: 0,      yMax: 50    },
    'appsec_generator.trace.reqs':                     { yMin: 0,      yMax: 300   },
    'appsec_generator.signal.trigger':                 { yMin: 0,      yMax: 25    },
    'appsec_generator.signal.trigger.failed':          { yMin: 0,      yMax: 10    },
    'data_streams.sqs.dead_letter_queue.messages':     { yMin: 0,      yMax: 50    },
    'synth.funnel.sales_completed':                    { yMin: 0,      yMax: 500   },
    'snmp.ifHCInOctets.rate':                          { yMin: 0,      yMax: 1000000 },

  // generateSeries now uses actual yMin/yMax from METRIC_RANGES
  function generateSeries(shape, yMin, yMax, n = 60) {
    const range = yMax - yMin;
    const data = [];
    for (let i = 0; i < n; i++) {
      const t = i / n;
      let norm; // 0.0 – 1.0, then scaled to [yMin, yMax]
      switch (shape) {
        case 'spike':
          // flat baseline ~5-8% of range, spike to 55-95% at midpoint
          norm = (t > 0.55 && t < 0.75)
            ? 0.55 + Math.abs(Math.sin((t - 0.55) * Math.PI * 5)) * 0.4 + rnd(-0.02, 0.02)
            : rnd(0.01, 0.07);
          break;
        case 'business_hours':
          norm = Math.max(0, Math.sin((t - 0.15) * Math.PI) * rnd(0.6, 0.9) + rnd(-0.04, 0.04));
          break;
        case 'variable':
          norm = Math.max(0.05, Math.min(0.95, 0.45 + rnd(-0.2, 0.2) + Math.sin(t * Math.PI * 5) * 0.12));
          break;
        case 'variable_high':
          norm = Math.max(0.2, Math.min(0.95, 0.6 + rnd(-0.2, 0.2) + Math.sin(t * Math.PI * 3) * 0.1));
          break;
        case 'increasing':
          norm = Math.max(0, Math.min(1, 0.1 + t * 0.7 + rnd(-0.03, 0.03)));
          break;
        case 'decreasing':
          norm = Math.max(0, Math.min(1, 0.9 - t * 0.6 + rnd(-0.04, 0.04)));
          break;
        case 'mostly_one':
          // 1 (up) except two brief 1-min windows → drops to 0
          norm = (t > 0.34 && t < 0.36) || (t > 0.71 && t < 0.73) ? 0 : 0.97 + rnd(-0.01, 0.01);
          break;
        case 'random_spikes':
          norm = Math.random() < 0.07 ? rnd(0.4, 0.9) : rnd(0, 0.06);
          break;
        case 'sinusoidal':
          norm = Math.max(0, Math.min(1, 0.5 + Math.sin(t * Math.PI * 4) * 0.35 + rnd(-0.02, 0.02)));
          break;
        case 'stable':
          // near-constant (e.g. azure device count = 23 or 17)
          norm = 0.55 + rnd(-0.04, 0.04);
          break;
        case 'sawtooth':
          norm = Math.max(0, Math.min(1, ((t * 5) % 1) * 0.8 + rnd(-0.03, 0.03)));
          break;
        default:
          norm = rnd(0.3, 0.7);
      }
      data.push(yMin + norm * range);
    }
    return data;
  }

  // ── Comparison series generator ───────────────────────────────────────────
  // Returns a correlated but visually distinct version of baseData for the comparison period.
  function generateCompSeries(baseData, label) {
    const isYesterday = label === 'yesterday';
    const n = baseData.length;
    // Yesterday: small scale shift + tight noise + minor drift
    // Last week: bigger scale shift + heavier noise + visible trend
    const scale    = isYesterday ? rnd(0.88, 1.13) : rnd(0.72, 1.28);
    const trendDir = rnd(-1, 1) > 0 ? 1 : -1;
    const trendAmp = isYesterday ? 0.04 : 0.18;
    const noiseAmp = isYesterday ? 0.04 : 0.10;
    // For last week, optionally inject a single realistic spike/dip
    const spikeIdx = !isYesterday && Math.random() < 0.55 ? Math.floor(rnd(0.2, 0.75) * n) : -1;
    return baseData.map((v, i) => {
      const t = i / n;
      let val = v * scale + v * trendDir * trendAmp * t + v * rnd(-noiseAmp, noiseAmp);
      if (i >= spikeIdx && i < spikeIdx + 4) {
        const spike = Math.sin(((i - spikeIdx) / 4) * Math.PI);
        val += v * spike * rnd(0.25, 0.55) * (Math.random() > 0.5 ? 1 : -0.5);
      }
      return Math.max(0, val);
    });
  }

  // ── Chart rendering ──────────────────────────────────────────────────────
  let currentCfg = null;

  function drawChart(cfg, targetCanvas) {
    const canvas = targetCanvas || document.getElementById('metricChart');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvas.offsetWidth * dpr;
    canvas.height = canvas.offsetHeight * dpr;
    ctx.scale(dpr, dpr);
    const W = canvas.offsetWidth, H = canvas.offsetHeight;
    const pl = 52, pr = 16, pt = 12, pb = 36;
    const cw = W - pl - pr, ch = H - pt - pb;

    const numSeries = Math.min(cfg.series.length, cfg.colors.length);
    const seriesData = cfg._forceSeriesData || Array.from({length: numSeries}, () => generateSeries(cfg.shape, cfg.yMin ?? 0, cfg.yMax ?? 100));
    // Cache for comparison overlay generation
    if (!targetCanvas) canvas._lastSeriesData = seriesData;

    const allVals = [...seriesData.flat(), ...(cfg.compOverlay ? cfg.compOverlay.flat() : [])];
    const dataMin = Math.min(...allVals);
    const dataMax = Math.max(...allVals);
    const yMin = Math.max(0, dataMin * 0.85);
    const yMax = dataMax * 1.12;
    const n = seriesData[0].length;

    const toX = i => pl + (i / (n - 1)) * cw;
    const toY = v => pt + ch - ((v - yMin) / (yMax - yMin + 0.0001)) * ch;
    const xLabels = genXLabels(n);

    function drawGrid() {
      const yTicks = 5;
      ctx.font = `11px -apple-system, sans-serif`;
      ctx.fillStyle = '#9ca3af';
      ctx.textAlign = 'right';
      for (let i = 0; i <= yTicks; i++) {
        const v = yMin + (i / yTicks) * (yMax - yMin);
        const y = toY(v);
        ctx.fillText(fmtNum(v), pl - 6, y + 4);
        ctx.beginPath(); ctx.strokeStyle = '#f3f4f6'; ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]); ctx.moveTo(pl, y); ctx.lineTo(pl + cw, y); ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.textAlign = 'center'; ctx.fillStyle = '#9ca3af';
      xLabels.forEach(({ idx, label }) => {
        ctx.fillText(label, toX(idx), H - 6);
        ctx.beginPath(); ctx.strokeStyle = '#f3f4f6'; ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]); ctx.moveTo(toX(idx), pt); ctx.lineTo(toX(idx), pt + ch); ctx.stroke();
        ctx.setLineDash([]);
      });
    }

    function drawSeries(revealFraction) {
      // Clip series to revealed width
      ctx.save();
      ctx.beginPath();
      ctx.rect(pl, 0, cw * revealFraction, H);
      ctx.clip();

      seriesData.forEach((data, si) => {
        const color = cfg.colors[si];
        const grad = ctx.createLinearGradient(0, pt, 0, pt + ch);
        grad.addColorStop(0, hexAlpha(color, 0.15));
        grad.addColorStop(1, hexAlpha(color, 0.01));
        ctx.beginPath();
        ctx.moveTo(toX(0), toY(data[0]));
        for (let i = 1; i < n; i++) {
          const cx_ = (toX(i-1) + toX(i)) / 2;
          ctx.bezierCurveTo(cx_, toY(data[i-1]), cx_, toY(data[i]), toX(i), toY(data[i]));
        }
        ctx.lineTo(toX(n-1), pt+ch); ctx.lineTo(toX(0), pt+ch); ctx.closePath();
        ctx.fillStyle = grad; ctx.fill();

        ctx.beginPath();
        ctx.moveTo(toX(0), toY(data[0]));
        for (let i = 1; i < n; i++) {
          const cx_ = (toX(i-1) + toX(i)) / 2;
          ctx.bezierCurveTo(cx_, toY(data[i-1]), cx_, toY(data[i]), toX(i), toY(data[i]));
        }
        ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
      });

      // Draw comparison overlay as dashed lines
      if (cfg.compOverlay && cfg.compOverlay.length) {
        const dashPat = cfg.compDash || [7, 4];
        cfg.compOverlay.forEach((data, si) => {
          const color = cfg.colors[si % cfg.colors.length];
          ctx.save();
          ctx.globalAlpha = 0.55;
          ctx.setLineDash(dashPat);
          ctx.lineWidth = 1.5;
          ctx.strokeStyle = color;
          ctx.beginPath();
          ctx.moveTo(toX(0), toY(data[0]));
          for (let i = 1; i < data.length; i++) {
            const cx_ = (toX(i-1) + toX(i)) / 2;
            ctx.bezierCurveTo(cx_, toY(data[i-1]), cx_, toY(data[i]), toX(i), toY(data[i]));
          }
          ctx.stroke();
          ctx.restore();
        });
      }

      ctx.restore();
    }

    // Cancel any running animation on this canvas
    if (canvas._raf) cancelAnimationFrame(canvas._raf);

    const duration = 480;
    let t0 = null;

    function frame(ts) {
      if (!t0) t0 = ts;
      const elapsed = ts - t0;
      const raw = Math.min(elapsed / duration, 1);
      // Cubic ease-out for main reveal
      const ease = 1 - Math.pow(1 - raw, 3);
      // Comparison fades in during the last 30% of the animation
      ctx.clearRect(0, 0, W, H);
      drawGrid();
      drawSeries(ease);

      if (raw < 1) canvas._raf = requestAnimationFrame(frame);
    }
    canvas._raf = requestAnimationFrame(frame);
  }

  function hexAlpha(hex, a) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  function fmtNum(n) {
    if (Math.abs(n) >= 1000000) return (n/1000000).toFixed(1)+'M';
    if (Math.abs(n) >= 1000) return (n/1000).toFixed(1)+'K';
    if (Math.abs(n) < 10) return n.toFixed(2);
    return Math.round(n).toString();
  }

  function genXLabels(n) {
    const now = new Date();
    const labels = [];
    const step = Math.floor(n / 7);
    for (let i = 0; i <= 6; i++) {
      const idx = Math.min(i * step, n - 1);
      const d = new Date(now.getTime() - (n - 1 - idx) * 60000);
      const h = d.getHours(), m = d.getMinutes();
      const hh = h % 12 || 12;
      const mm = m.toString().padStart(2,'0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      labels.push({ idx, label: `${hh}:${mm} ${ampm}` });
    }
    return labels;
  }

  // ── UI update ────────────────────────────────────────────────────────────
  function renderPage(cfg) {
    currentCfg = cfg;

    updateQueryBuilder(cfg, null);

    // Chart title
    document.getElementById('chartTitle').textContent = cfg.description;
    document.getElementById('chartMeta').textContent = `Past 24h · 1-min intervals · ${cfg.yLabel}`;

    // Legend
    const legendEl = document.getElementById('chartLegend');
    const series = cfg.selectedGroupBy ? cfg.series : [cfg.metric.split('.').slice(-1)[0]];
    let legendHTML = series.map((s, i) => `
      <div class="legend-item">
        <div class="legend-dot" style="background:${cfg.colors[i % cfg.colors.length]};"></div>
        ${cfg.selectedGroupBy ? cfg.selectedGroupBy + ':' : ''}${s}
      </div>
    `).join('');
    if (cfg.comparison) {
      legendHTML += series.map((s, i) => `
        <div class="legend-item" style="opacity:0.6;">
          <div class="legend-dot" style="background:${cfg.colors[i % cfg.colors.length]};border: 2px dashed ${cfg.colors[i % cfg.colors.length]};height:0;"></div>
          ${s} (${cfg.comparisonLabel || 'last week'})
        </div>
      `).join('');
    }
    legendEl.innerHTML = legendHTML;

    // Init chat if first render (chatHistory empty)
    if (!document.getElementById('chatHistory').dataset.initialized) {
      initChat(cfg);
    }

    setTimeout(() => {
      drawChart(cfg);
      if (cfg.comparison) showCompChart(cfg);
    }, 50);
  }

  function selectAgg(agg) {
    currentCfg = { ...currentCfg, selectedAgg: agg };
    renderChartOnly(`Aggregation: ${agg}`, 'agg');
  }

  function selectTag(tag) {
    currentCfg = { ...currentCfg, selectedGroupBy: tag };
    renderChartOnly(tag ? `Grouped by ${tag}` : 'Breakdown removed', 'groupby');
  }

  function navigate(q) {
    window.location.href = `query-result.html?q=${encodeURIComponent(q)}`;
  }

  // ── Query Builder ─────────────────────────────────────────────────────────
  function updateQueryBuilder(cfg, changedPart) {
    // Metric field
    const metricEl = document.getElementById('qbMetric');
    metricEl.textContent = cfg.metric;
    if (changedPart === 'metric') popField(metricEl);

    // Filter
    const filterEl = document.getElementById('qbFilter');
    const filterText = cfg.defaultFilter || '';
    filterEl.textContent = filterText || '(everywhere)';
    filterEl.classList.toggle('has-val', !!filterText);
    if (changedPart === 'filter') popField(filterEl);

    // Aggregation
    const aggEl = document.getElementById('qbAgg');
    aggEl.textContent = cfg.selectedAgg;
    if (changedPart === 'agg') popField(aggEl);

    // Group-by
    const gbEl = document.getElementById('qbGroupBy');
    const gbText = cfg.selectedGroupBy || '';
    gbEl.textContent = gbText || '(everything)';
    gbEl.classList.toggle('has-val', !!gbText);
    if (changedPart === 'groupby') popField(gbEl);

    // Rebuild dropdowns
    rebuildAggDd(cfg);
    rebuildGbDd(cfg);

    // Comparison row
    updateQbCompRow(cfg);
  }

  function popField(el) {
    el.classList.remove('field-pop');
    void el.offsetWidth;
    el.classList.add('field-pop');
    el.addEventListener('animationend', () => el.classList.remove('field-pop'), { once: true });
  }

  function updateQbCompRow(cfg) {
    const row = document.getElementById('qbCompRow');
    if (!cfg.comparison) {
      row.style.display = 'none';
      row.innerHTML = '';
      return;
    }
    row.style.display = 'block';
    const label = cfg.comparisonLabel || 'comparison';
    row.innerHTML = `<div class="qb-row">
      <span class="qb-badge qb-badge-b">b</span>
      <div class="qb-type">Metrics <span style="font-size:10px;color:#9ca3af;margin-left:2px;">▾</span></div>
      <div class="qb-metric">${cfg.metric || '—'}</div>
      <span class="qb-lbl">from</span>
      <div class="qb-filter">${cfg.defaultFilter || '(everywhere)'}</div>
      <div class="qb-agg-wrap"><div class="qb-agg-val">${cfg.selectedAgg || cfg.defaultAgg || 'avg'}</div></div>
      <span class="qb-lbl" style="padding-left:0;">by</span>
      <div class="qb-groupby">${cfg.selectedGroupBy || '(everything)'}</div>
      <span class="qb-comp-lbl" style="margin-left:8px;"><span class="qb-comp-dash"></span>vs. ${label}</span>
      <button class="qb-ai-btn" title="AI">✦</button>
      <div class="qb-right">
        <span title="Edit as code">&lt;/&gt;</span>
        <span title="Style">✏</span>
        <span title="Color">◑</span>
        <span title="Alias">as...</span>
      </div>
      <span class="qb-comp-remove" onclick="removeComparison()" title="Remove comparison">✕</span>
    </div>`;
  }

  function removeComparison() {
    currentCfg = { ...currentCfg, comparison: false };
    document.getElementById('compChartPanel').classList.remove('visible');
    renderChartOnly('Comparison removed', 'comparison');
  }

  function showCompChart(cfg) {
    const panel = document.getElementById('compChartPanel');
    panel.classList.add('visible');
    const label = cfg.comparisonLabel || 'comparison';
    document.getElementById('compChartTitle').textContent = cfg.description || cfg.metric || '—';
    document.getElementById('compPeriodBadge').textContent = label.charAt(0).toUpperCase() + label.slice(1);
    document.getElementById('compChartMeta').textContent = 'Past 24h · 1-min intervals · ' + (cfg.yLabel || '');

    // Generate correlated comparison data from the main chart's cached series
    const mainCanvas = document.getElementById('metricChart');
    const cachedData = mainCanvas._lastSeriesData;
    const compSeriesData = cachedData
      ? cachedData.map(series => generateCompSeries(series, label))
      : null;

    // Secondary panel: draw comparison period as its own solid chart (muted colors)
    const muted = cfg.colors.map(c => {
      const r = parseInt(c.slice(1,3),16), g = parseInt(c.slice(3,5),16), b = parseInt(c.slice(5,7),16);
      return `#${Math.round(r*0.6+100).toString(16).padStart(2,'0')}${Math.round(g*0.6+100).toString(16).padStart(2,'0')}${Math.round(b*0.6+100).toString(16).padStart(2,'0')}`;
    });
    drawChart({ ...cfg, _forceSeriesData: compSeriesData, colors: muted, comparison: false }, document.getElementById('compMetricChart'));

    // Legend
    const series = cfg.selectedGroupBy
      ? cfg.allTags.filter(t => t !== cfg.selectedGroupBy).concat([cfg.selectedGroupBy]).slice(-cfg.series.length)
      : cfg.series;
    document.getElementById('compChartLegend').innerHTML = series.map((s, i) =>
      `<div class="legend-item"><div class="legend-dot" style="background:${muted[i % muted.length]};"></div>${s} (${label})</div>`
    ).join('');
  }

  function rebuildAggDd(cfg) {
    document.getElementById('aggDd').innerHTML = cfg.aggs.map(a =>
      `<div class="qb-dropdown-opt ${a === cfg.selectedAgg ? 'sel' : ''}" onclick="selectAgg('${a}');closeAllDd();">${a}</div>`
    ).join('');
  }

  function rebuildGbDd(cfg) {
    document.getElementById('gbDd').innerHTML =
      `<div class="qb-dropdown-opt ${!cfg.selectedGroupBy ? 'sel' : ''}" onclick="selectTag(null);closeAllDd();">(everything)</div>` +
      cfg.allTags.map(t =>
        `<div class="qb-dropdown-opt ${t === cfg.selectedGroupBy ? 'sel' : ''}" onclick="selectTag('${t}');closeAllDd();">${t}</div>`
      ).join('');
  }

  function toggleQbDropdown(id, e) {
    e.stopPropagation();
    const dd = document.getElementById(id);
    const wasHidden = dd.style.display === 'none';
    closeAllDd();
    dd.style.display = wasHidden ? 'block' : 'none';
  }

  function closeAllDd() {
    ['aggDd','gbDd'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });
  }

  document.addEventListener('click', closeAllDd);

  function pulseQueryPanel() {
    const panel = document.getElementById('queryPanel');
    panel.classList.remove('panel-updating');
    void panel.offsetWidth;
    panel.classList.add('panel-updating');
  }

  function showChartToast(msg) {
    const container = document.querySelector('.chart-container');
    const old = container.querySelector('.chart-toast');
    if (old) old.remove();
    const el = document.createElement('div');
    el.className = 'chart-toast';
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(() => { if (el.parentNode) el.remove(); }, 2600);
  }

  function pulseChartPanel() {
    const panel = document.querySelector('.chart-panel');
    panel.classList.remove('chart-updating');
    void panel.offsetWidth;
    panel.classList.add('chart-updating');
  }

  function renderChartOnly(toast, changedPart) {
    const cfg = currentCfg;

    // Pulse both panels + chart toast
    pulseChartPanel();
    pulseQueryPanel();
    if (toast) showChartToast(toast);

    updateQueryBuilder(cfg, changedPart || null);

    // Legend
    const series = cfg.selectedGroupBy ? cfg.series : [cfg.metric.split('.').slice(-1)[0]];
    let legendHTML = series.map((s, i) => `
      <div class="legend-item"><div class="legend-dot" style="background:${cfg.colors[i % cfg.colors.length]};"></div>
      ${cfg.selectedGroupBy ? cfg.selectedGroupBy + ':' : ''}${s}</div>`).join('');
    if (cfg.comparison) {
      legendHTML += series.map((s, i) => `
        <div class="legend-item" style="opacity:0.6;"><div class="legend-dot" style="background:${cfg.colors[i % cfg.colors.length]};border:2px dashed ${cfg.colors[i % cfg.colors.length]};height:0;"></div>
        ${s} (${cfg.comparisonLabel || 'last week'})</div>`).join('');
    }
    document.getElementById('chartLegend').innerHTML = legendHTML;

    setTimeout(() => {
      drawChart(cfg);
      if (cfg.comparison) showCompChart(cfg);
      else document.getElementById('compChartPanel').classList.remove('visible');
    }, 30);
  }

  function runSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;
    const listIntent = /\b(list|show me all|all metrics|every metric|browse|show me)\b/i.test(q);
    window.location.href = listIntent
      ? 'search-results.html?q=' + encodeURIComponent(q)
      : 'query-result.html?q=' + encodeURIComponent(q);
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') runSearch();
  });

      patterns: [/\bp95\b|95th percentile/i],
      action: () => {
        if (!currentCfg.aggs.includes('p95')) return `p95 isn't available for **${currentCfg.metric}**. Try: ${currentCfg.aggs.join(', ')}.`;
        selectAgg('p95');
        return "Switched to **p95**. This captures the worst 5% of requests — a good balance between sensitivity and noise.\n\nCommon follow-up: compare this to last week to see if it's trending worse.";
      }
    },
    {
      id: 'agg_max',
      patterns: [/\bmax(imum)?\b|peak\s*aggregat|highest\s*aggregat/i],
      action: () => {
        if (!currentCfg.aggs.includes('max')) return `max isn't an option here. Available: ${currentCfg.aggs.join(', ')}.`;
        selectAgg('max');
        return "Switched to **max** — every point now shows the single highest value in that interval. Watch for outlier spikes that avg would smooth over.";
      }
    },
    {
      id: 'agg_avg',
      patterns: [/\bavg\b|average|mean\s+value/i],
      action: () => {
        if (!currentCfg.aggs.includes('avg')) return `avg isn't an option here. Available: ${currentCfg.aggs.join(', ')}.`;
        selectAgg('avg');
        return "Switched to **avg**. This is the mean across all sources per interval — good for overall trend, but can hide outliers. Want me to also show p95 for comparison?";
      }
    },
    {
      id: 'agg_sum',
      patterns: [/\bsum\b|total\s+across/i],
      action: () => {
        if (!currentCfg.aggs.includes('sum')) return `sum isn't an option here. Available: ${currentCfg.aggs.join(', ')}.`;
        selectAgg('sum');
        return "Switched to **sum** — aggregating the total across all sources. Useful for counts and rates where you want the combined picture, not the per-source average.";
      }
    },
    {
      id: 'group_host', chip: 'Break down by host',
      patterns: [/(break.*down|group|split).*(by\s+)?host|by\s+host|per\s+host/i],
      action: () => {
        if (!currentCfg.allTags.includes('host')) return `host isn't a tag on **${currentCfg.metric}**. Available tags: ${currentCfg.allTags.join(', ')}.\n\nWant me to try one of those instead?`;
        selectTag('host');
        return "Grouped by **host** — each line is a different host now. If one is consistently higher than the rest, that's your hotspot.\n\nWant to filter to just the top offenders, or create a monitor that alerts on any single host crossing a threshold?";
      }
    },
    {
      id: 'group_service',
      patterns: [/(break.*down|group|split).*(by\s+)?service|by\s+service|per\s+service/i],
      action: () => {
        if (!currentCfg.allTags.includes('service')) return `service isn't a tag on **${currentCfg.metric}**. Available: ${currentCfg.allTags.join(', ')}.`;
        selectTag('service');
        return "Grouped by **service**. Look for any service pulling significantly ahead — that's where to focus your investigation.\n\nWant me to explain what each service does, or check if there are existing monitors for the top one?";
      }
    },
    {
      id: 'group_region',
      patterns: [/(break.*down|group|split).*(by\s+)?region|by\s+region|per\s+region/i],
      action: () => {
        if (!currentCfg.allTags.includes('region')) return `region isn't a tag on **${currentCfg.metric}**. Available: ${currentCfg.allTags.join(', ')}.`;
        selectTag('region');
        return "Grouped by **region**. Regional divergence is often a sign of a localized deploy, network issue, or traffic shift.\n\nWant to compare this to last week by region as well?";
      }
    },
    {
      id: 'group_zone',
      patterns: [/(break.*down|group|split).*(by\s+)?(zone|az)|by\s+(zone|az)|availability.?zone/i],
      action: () => {
        if (!currentCfg.allTags.includes('availability-zone')) return `availability-zone isn't a tag on **${currentCfg.metric}**. Available: ${currentCfg.allTags.join(', ')}.`;
        selectTag('availability-zone');
        return "Grouped by **availability zone**. If one AZ is out of step with the others, that's a sign of an AZ-specific issue or imbalanced traffic.\n\nWant to create an alert that fires when any single AZ exceeds a threshold?";
      }
    },
    {
      id: 'remove_breakdown',
      patterns: [/remove.*(breakdown|groupby|group)|no\s+breakdown|single\s+line|ungroup/i],
      action: () => { selectTag(null); return "Removed the breakdown — showing the aggregated view now. Everything is rolled up into a single line.\n\nWant to try a different grouping, or overlay a comparison period?"; }
    },
    {
      id: 'peak', chip: "What's the peak?",
      patterns: [/what.*peak|peak\s+value|highest\s+value|max\s+value|what.*max/i],
      action: () => {
        const peak = fmtNum(currentCfg.yMax);
        return `Based on the synthesizer's submitted ranges, **${currentCfg.metric}** peaks at around **${peak} ${currentCfg.yLabel}**.\n\nFor the actual live peak from your Datadog org, ask me "what was the max in the last 24h?" and I'll query real data if the backend is connected.`;
      }
    },
    {
      id: 'normal', chip: 'Is this normal?',
      patterns: [/is\s+this\s+normal|anomal|unusual|expected|baseline/i],
      action: () => {
        const msgs = {
          spike: "Those spikes look like they could be incidents — the baseline is low and then it jumps sharply. That pattern is worth an anomaly monitor.\n\nWant me to help you set one up?",
          business_hours: "Looks completely normal — classic business hours traffic. It ramps up in the morning, peaks mid-day, then drops off. No anomalies here.\n\nIf you're worried about the overnight floor rising, that'd be worth monitoring.",
          random_spikes: "The intermittent spikes are a yellow flag. If they're expected (e.g. scheduled jobs), you're fine. If not, you should alert on them.\n\nWant me to set up a threshold alert for when this exceeds its baseline?",
          mostly_one: "Looks healthy — the metric is at its expected value almost the entire time with only brief dips. Those dips are very short, likely under a minute each.\n\nIf you want to alert on them, an SLO monitor is the right tool here.",
          increasing: "This is trending upward over time — that's a flag. It could be expected growth, a leak, or accumulation. Worth investigating before it becomes a problem.\n\nWant me to check how long it's been trending up, or set a capacity alert?",
          decreasing: "This is declining steadily. Depending on the metric, that could be good (memory freeing up) or bad (requests dropping). What's the expected behavior here?",
          stable: "Very stable — this metric barely moves. That's either very healthy, or the signal is too coarse to be useful. Is this behaving as expected for you?",
          variable: "Normal variability — nothing jumps out as an anomaly in this window. The variance looks consistent with typical workload fluctuation.",
          sinusoidal: "The regular sine-wave pattern looks intentional — probably temperature cycling or a device on a schedule. That's expected for this type of sensor metric.",
          sawtooth: "The sawtooth pattern is from periodic resets — expected behavior. The drops are clean and regular, which means they're controlled, not crashes.",
        };
        return (msgs[currentCfg.shape] || "The metric looks within normal ranges based on historical submitted values.") +
          "\n\nAnything specific you want me to dig into?";
      }
    },
    {
      id: 'explain', chip: 'Explain this metric',
      patterns: [/explain|what\s+is|what\s+does|describe|tell\s+me\s+about|what.*measure/i],
      action: () => `**${currentCfg.metric}**\n\n${currentCfg.description}\n\nType: \`${currentCfg.type}\`\nDefault aggregation: \`${currentCfg.defaultAgg}\`\nAvailable tags: ${currentCfg.allTags.map(t => `\`${t}\``).join(', ')}\n\nWant me to show you related metrics, or explain what the current aggregation (\`${currentCfg.selectedAgg}\`) means for this type?`
    },
    {
      id: 'monitor',
      patterns: [/create.*monitor|set.*alert|new\s+monitor|alert\s+me|set up.*alert/i],
      action: () => {
        const q = encodeURIComponent(buildDDQuery(currentCfg));
        const url = `https://app.datadoghq.com/monitors/create?query=${q}`;
        // Return reply text + signal for the UI to render an action button
        return `__MONITOR_FLOW__:${url}`;
      }
    },
    {
      id: 'switch_cpu',
      patterns: [/switch.*cpu|show.*cpu|cpu\s+metric/i],
      action: () => { setTimeout(() => navigate('cpu utilization by availability zone'), 1000); return "Switching to CPU utilization — I'll load the chart now."; }
    },
    {
      id: 'switch_memory',
      patterns: [/switch.*memory|show.*memory|memory\s+metric/i],
      action: () => { setTimeout(() => navigate('memory usage by availability zone'), 1000); return "Switching to memory usage — loading now."; }
    },
    {
      id: 'switch_checkout',
      patterns: [/switch.*checkout|show.*checkout|checkout\s+fail/i],
      action: () => { setTimeout(() => navigate('checkout failures by availability zone'), 1000); return "Switching to checkout failures — loading now."; }
    },
    {
      id: 'time_1h',
      patterns: [/last\s+hour|past\s+hour|\b1\s*h\b/i],
      action: () => { document.getElementById('chartMeta').textContent = `Past 1h · 1-min intervals · ${currentCfg.yLabel}`; pulseChartPanel(); showChartToast('Time range: Last 1 hour'); return "Showing the last **1 hour** at 1-minute resolution. Good for investigating something happening right now."; }
    },
    {
      id: 'time_7d',
      patterns: [/last\s+week|past\s+week|\b7\s*d\b/i],
      action: () => { document.getElementById('chartMeta').textContent = `Past 7d · 1-hour intervals · ${currentCfg.yLabel}`; pulseChartPanel(); showChartToast('Time range: Last 7 days'); return "Zoomed out to the last **7 days** at hourly resolution. Good for spotting weekly patterns or slow trends."; }
    },
    {
      id: 'breakdown_query', chip: 'Breakdown this query',
      patterns: [/breakdown|break down|explain query|how.*query.*work|steps/i],
      action: () => {
        const agg = currentCfg.selectedAgg || currentCfg.defaultAgg || 'avg';
        const group = currentCfg.selectedTag || 'none';
        return `Here's how I built this query in **4 steps**:\n\n**Step 1 — Pick the metric**\nSelected \`${currentCfg.metric}\` based on your search. This metric tracks ${currentCfg.description.split('.')[0].toLowerCase()}.\n\n**Step 2 — Choose the aggregation**\nApplied **${agg}** across all matching time series. This collapses multiple hosts/instances into a single curve.\n\n**Step 3 — Group by tag**\n${group !== 'none' ? `Grouped by \`${group}\` to split the result by that dimension.` : `No grouping applied — all hosts are rolled up together. Try "break down by host" to split them.`}\n\n**Step 4 — Scope the time range**\nFiltered to the selected window and sampled at the appropriate interval to keep the chart readable.`;
      }
    },
  ];

  const CHIP_IDS = ['breakdown_query', 'compare_week', 'group_host', 'peak', 'normal', 'explain'];

  // ── Action execution (from server) ────────────────────────────────────────
  function executeServerActions(actions) {
    if (!actions || !actions.length) return;
    actions.forEach(a => {
      if (!a || !a.type) return;
      switch (a.type) {
        case 'set_agg':
          if (a.value && currentCfg.aggs.includes(a.value)) selectAgg(a.value);
          break;
        case 'set_group':
          if (a.value && currentCfg.allTags.includes(a.value)) selectTag(a.value);
          else if (a.value === null || a.value === 'none') selectTag(null);
          break;
        case 'add_comparison':
          currentCfg = { ...currentCfg, comparison: true, comparisonLabel: a.label || 'comparison' };
          renderChartOnly(`Comparison: ${a.label || 'period'} added`);
          break;
        case 'remove_comparison':
          currentCfg = { ...currentCfg, comparison: false };
          renderChartOnly('Comparison removed');
          break;
        case 'open_url':
          // rendered as button inside the chat bubble — handled in addBotMsg
          break;
      }
    });
  }

  function initChat(cfg) {
    const el = document.getElementById('chatHistory');
    el.dataset.initialized = '1';
    el.innerHTML = '';
    const intro = `Hey! I'm **Bits**. I'm looking at **${cfg.metric}** with you.\n\n${cfg.description}\n\nAsk me anything — I can change the graph, query live Datadog data, walk you through creating a monitor, and more.`;
    addBotMsg(intro);
    renderChips();
  }

  function renderChips() {
    const chipsEl = document.getElementById('chatChips');
    chipsEl.innerHTML = CHAT_INTENTS
      .filter(i => i.chip && CHIP_IDS.includes(i.id))
      .map((i, idx) => `<span class="chip" style="animation-delay:${idx * 55}ms" onclick="chipClick('${i.id}')">${i.chip}</span>`)
      .join('');
  }

  function chipClick(id) {
    const intent = CHAT_INTENTS.find(i => i.id === id);
    if (!intent) return;
    addUserMsg(intent.chip);
    const response = intent.action();
    if (response) showTypingThen(response);
  }

  function addUserMsg(text) {
    const el = document.getElementById('chatHistory');
    const div = document.createElement('div');
    div.className = 'chat-msg user';
    div.innerHTML = `<div class="chat-msg-row"><div class="chat-bubble">${escHtml(text)}</div></div>`;
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
  }

  function addBotMsg(text, actions) {
    // Handle special monitor flow signal
    if (typeof text === 'string' && text.startsWith('__MONITOR_FLOW__:')) {
      const url = text.split(':').slice(1).join(':');
      text = `Sure, let's set up a monitor for **${currentCfg.metric}**.\n\nHere's what I'll configure:\n- **Query:** \`${buildDDQuery(currentCfg)}\`\n- **Type:** Threshold alert\n\nI've pre-filled the monitor create page with your current query. Click below to open it in Datadog and set your threshold + notification channels:`;
      actions = [{ type: 'open_url', url, label: 'Create Monitor in Datadog →' }];
    }

    const el = document.getElementById('chatHistory');
    const div = document.createElement('div');
    div.className = 'chat-msg bot';

    let html = `<div class="chat-msg-row"><div class="bot-avatar"><svg width="12" height="12" viewBox="0 0 24 24" fill="#fff"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg></div><div class="chat-bubble">${formatBotText(text)}`;

    // Inline code blocks
    html = html.replace(/`([^`]+)`/g, '<code style="background:#1a1f32;padding:1px 5px;border-radius:3px;font-family:monospace;font-size:11px;">$1</code>');

    // open_url actions → render as a button inside the bubble
    const urlActions = (actions || []).filter(a => a && a.type === 'open_url');
    if (urlActions.length) {
      html += urlActions.map(a =>
        `<br><br><a href="${escHtml(a.url)}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;margin-top:4px;padding:6px 12px;background:#7c3aed;color:#fff;border-radius:7px;font-size:12px;font-weight:600;text-decoration:none;transition:background 0.15s;" onmouseover="this.style.background='#6d28d9'" onmouseout="this.style.background='#7c3aed'">${escHtml(a.label || 'Open in Datadog')} ↗</a>`
      ).join('');
    }

    html += '</div></div>';
    div.innerHTML = html;
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
    return div;
  }

  function formatBotText(text) {
    return escHtml(text)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showTypingThen(response, actions) {
    const el = document.getElementById('chatHistory');
    const typing = document.createElement('div');
    typing.className = 'chat-msg bot';
    typing.innerHTML = '<div class="chat-msg-row"><div class="bot-avatar"><svg width="12" height="12" viewBox="0 0 24 24" fill="#fff"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg></div><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
    el.appendChild(typing);
    el.scrollTop = el.scrollHeight;
    setTimeout(() => {
      if (el.contains(typing)) el.removeChild(typing);
      addBotMsg(response, actions);
    }, 600 + Math.random() * 350);
  }

  const CHAT_SERVER = 'http://localhost:7788';
  let serverAvailable = null; // null=unknown, true, false
  const chatHistory = []; // [{role, content}] for server context

  async function checkServer() {
    if (serverAvailable !== null) return serverAvailable;
    try {
      const r = await fetch(`${CHAT_SERVER}/api/health`, { signal: AbortSignal.timeout(1500) });
      serverAvailable = r.ok;
    } catch { serverAvailable = false; }
    return serverAvailable;
  }

  function sendChatMsg() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    addUserMsg(msg);

    // Local intents handle graph mutations instantly (no server round-trip needed)
    const ml = msg.toLowerCase();
    for (const intent of CHAT_INTENTS) {
      if (intent.patterns && intent.patterns.some(p => p.test(ml))) {
        const reply = intent.action(msg);
        if (reply) {
          chatHistory.push({ role: 'user', content: msg });
          chatHistory.push({ role: 'assistant', content: reply });
          showTypingThen(reply);
        }
        return;
      }
    }

    // Everything else → Claude + Datadog MCP for real data
    sendToServer(msg);
  }

  async function sendToServer(msg) {
    const available = await checkServer();
    if (!available) {
      const reply = localFallback(msg);
      chatHistory.push({ role: 'user', content: msg });
      chatHistory.push({ role: 'assistant', content: reply });
      showTypingThen(reply);
      return;
    }

    const el = document.getElementById('chatHistory');
    const typing = document.createElement('div');
    typing.className = 'chat-msg bot';
    typing.innerHTML = '<div class="chat-msg-row"><div class="bot-avatar"><svg width="12" height="12" viewBox="0 0 24 24" fill="#fff"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg></div><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
    el.appendChild(typing);
    el.scrollTop = el.scrollHeight;

    try {
      const context = {
        metric: currentCfg.metric,
        description: currentCfg.description,
        type: currentCfg.type,
        selectedAgg: currentCfg.selectedAgg,
        selectedGroupBy: currentCfg.selectedGroupBy,
        filter: currentCfg.defaultFilter,
        availableTags: currentCfg.allTags,
        yMin: currentCfg.yMin,
        yMax: currentCfg.yMax,
        yLabel: currentCfg.yLabel,
        comparison: currentCfg.comparison || false,
        comparisonLabel: currentCfg.comparisonLabel || null,
        ddQuery: buildDDQuery(currentCfg),
      };

      const r = await fetch(`${CHAT_SERVER}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, history: chatHistory.slice(-10), context }),
        signal: AbortSignal.timeout(30000),
      });

      if (el.contains(typing)) el.removeChild(typing);
      const data = await r.json();
      const reply = data.reply || data.error || 'No response from server.';
      const actions = data.actions || [];
      chatHistory.push({ role: 'user', content: msg });
      chatHistory.push({ role: 'assistant', content: reply });
      // Execute non-url actions first (they update the graph)
      executeServerActions(actions.filter(a => a.type !== 'open_url'));
      addBotMsg(reply, actions);
    } catch (err) {
      if (el.contains(typing)) el.removeChild(typing);
      const reply = localFallback(msg);
      chatHistory.push({ role: 'user', content: msg });
      chatHistory.push({ role: 'assistant', content: reply });
      addBotMsg(reply);
    }
  }

  function localFallback(msg) {
    const ml = msg.toLowerCase();
    if (ml.length > 3) {
      const parsed = parseQuery(msg);
      if (parsed && parsed.metric !== currentCfg.metric) {
        setTimeout(() => navigate(msg), 800);
        return `Switching to a query for "${msg}"...`;
      }
    }
    return `I can help with:\n• **Compare to last week/yesterday**\n• **Break down by host/service/region**\n• **Change aggregation** (avg, max, p95, p99)\n• **"What's the peak?"** or **"Is this normal?"**\n• **"Explain this metric"**\n\nFor live Datadog data, start the backend:\n\`python3 server.py\``;
  }

  document.getElementById('chatInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendChatMsg();
  });

  window.addEventListener('resize', () => { if (currentCfg) drawChart(currentCfg); });

  // ── Init ─────────────────────────────────────────────────────────────────
  const q = new URLSearchParams(window.location.search).get('q') || 'checkout failures by availability zone';
  document.getElementById('searchInput').value = q;
  const cfg = parseQuery(q);
  renderPage({ ...cfg, selectedAgg: cfg.defaultAgg, selectedGroupBy: cfg.defaultGroupBy });
  </script>
</body>
</html>
